name: Bug report
description: Report a problem with KnobMixer
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Keyboard / knob / device
      placeholder: Ajazz AK820, USB volume knob, normal keyboard, etc.
  - type: dropdown
    id: mode
    attributes:
      label: Intercept mode
      options:
        - Auto
        - Keyboard Hook
        - Raw Input / HID
        - Not sure
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start KnobMixer
        2. Select Spotify.exe
        3. Rotate knob
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs from logs/app.log or %APPDATA%\KnobMixer\logs\app.log.
      render: text
